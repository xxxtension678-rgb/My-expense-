<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lowercase monospace tracker</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.15); --accent: #00d4ff; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; 
            font-family: 'monaco', 'consolas', monospace;
            text-transform: lowercase; 
        }
        
        body { 
            margin: 0; padding: 0; height: 100vh;
            background: #020111; 
            color: #e0e0e0; display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 20px; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .p-btn { 
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); 
            cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .p-btn img { width: 100%; height: 100%; object-fit: cover; }

        .summary-area { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .glass-card { background: var(--glass); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
        .label { font-size: 10px; color: #888; margin-bottom: 4px; display: block; }
        .val-input { background: transparent; border: none; outline: none; color: #fff; font-size: 16px; width: 100%; }

        /* table & boxes fixed */
        .main-content { flex: 1; overflow-y: auto; padding: 0 10px 90px 10px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        thead th { position: sticky; top: 0; background: #020111; padding: 10px 0; font-size: 10px; color: var(--accent); z-index: 10; }
        
        /* input boxes ပြန်ပေါ်အောင် style ပြန်ပြင်ထားပါတယ် */
        .amt-box { 
            width: 90%; height: 35px; background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important; border-radius: 6px;
            color: #fff; text-align: center; font-size: 14px; outline: none;
            display: inline-block; -webkit-appearance: none;
        }
        .amt-box:focus { border: 1px solid var(--accent) !important; background: rgba(0, 212, 255, 0.1) !important; }

        .footer-glass { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(2, 1, 17, 0.9);
            backdrop-filter: blur(20px); padding: 15px 20px; border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .menu { 
            display: none; position: absolute; right: 20px; top: 55px; 
            background: #0f1035; border: 1px solid var(--border); border-radius: 8px; width: 160px; z-index: 200;
        }
        .menu div { padding: 12px; font-size: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div>april_2026_ledger</div>
        <div style="position: relative;">
            <div class="p-btn" onclick="toggleMenu()">
                <span id="pPlaceholder">u</span>
                <img id="userPhoto" style="display:none;">
            </div>
            <div id="menu" class="menu">
                <div onclick="alert('history')">[history]</div>
                <div id="authAction" onclick="handleAuth()">[login]</div>
            </div>
        </div>
    </header>

    <div class="summary-area">
        <div class="glass-card">
            <span class="label">starting_bal</span>
            <input type="number" id="startBal" class="val-input" placeholder="ks" oninput="calc()">
        </div>
        <div class="glass-card">
            <span class="label">remaining</span>
            <div class="val-input" id="remBal">0 ks</div>
        </div>
    </div>

    <div class="main-content">
        <table>
            <thead>
                <tr><th>day</th><th>mor</th><th>lun</th><th>din</th><th>otr</th></tr>
            </thead>
            <tbody id="grid"></tbody>
        </table>
    </div>

    <div class="footer-glass">
        <div id="syncStatus" style="font-size: 9px; color: var(--accent);">status: ready</div>
        <div style="font-size: 14px;">spent: <span id="totalSpent" style="color:var(--accent)">0</span></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDzEMJWMm6b1bBg2oKcUoYfsUAkhoNoZW4",
        authDomain: "my-expense-app-18a2a.firebaseapp.com",
        projectId: "my-expense-app-18a2a",
        storageBucket: "my-expense-app-18a2a.firebasestorage.app",
        messagingSenderId: "987816810795",
        appId: "1:987816810795:web:b78430ae1326cb62f3cd6e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function toggleMenu() { const m = document.getElementById('menu'); m.style.display = (m.style.display==='block')?'none':'block'; }

    // login logic fix
    function handleAuth() {
        if (auth.currentUser) {
            auth.signOut().then(() => location.reload());
        } else {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => {
                console.error(err);
                // popup ပိတ်ထားရင် redirect နဲ့ ပြန်ကြိုးစားမယ်
                auth.signInWithRedirect(provider);
            });
        }
    }

    auth.onAuthStateChanged(async user => {
        const authBtn = document.getElementById('authAction');
        const photo = document.getElementById('userPhoto');
        const placeholder = document.getElementById('pPlaceholder');

        if(user) {
            placeholder.style.display = 'none';
            photo.src = user.photoURL;
            photo.style.display = 'block';
            authBtn.innerText = "[logout]";
            
            const doc = await db.collection("monthly_data").doc(user.uid + "_2026-04").get();
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('startBal').value = d.startBal;
                const inps = document.querySelectorAll('.amt-box');
                d.expenses.forEach((v, i) => { if(v) inps[i].value = v; });
                calc();
            }
        }
    });

    const grid = document.getElementById('grid');
    for (let i = 1; i <= 30; i++) {
        grid.innerHTML += `<tr>
            <td>${i.toString().padStart(2, '0')}</td>
            <td><input type="number" class="amt-box" oninput="calc()"></td>
            <td><input type="number" class="amt-box" oninput="calc()"></td>
            <td><input type="number" class="amt-box" oninput="calc()"></td>
            <td><input type="number" class="amt-box" oninput="calc()"></td>
        </tr>`;
    }

    function calc() {
        let total = 0;
        document.querySelectorAll('.amt-box').forEach(inp => total += Number(inp.value) || 0);
        const start = Number(document.getElementById('startBal').value) || 0;
        document.getElementById('totalSpent').innerText = total.toLocaleString();
        document.getElementById('remBal').innerText = (start - total).toLocaleString() + " ks";
        
        // auto save
        const user = auth.currentUser;
        if(user) {
            document.getElementById('syncStatus').innerText = "status: syncing...";
            db.collection("monthly_data").doc(user.uid + "_2026-04").set({
                startBal: start,
                expenses: Array.from(document.querySelectorAll('.amt-box')).map(i => Number(i.value) || 0),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('syncStatus').innerText = "status: cloud_synced";
            });
        }
    }
</script>
</body>
</html>
