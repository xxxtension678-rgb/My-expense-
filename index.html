<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Fixed Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; }
        .page { display: none; padding: 20px; max-width: 500px; margin: auto; }
        .active { display: block; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        #loading { text-align: center; margin-top: 50px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="loading">စစ်ဆေးနေပါသည်...</div>

    <div id="loginPage" class="page">
        <div class="card" style="margin-top: 80px; text-align: center;">
            <h2>💰 Expense Tracker</h2>
            <p>အသုံးပြုရန် အကောင့်ဝင်ပါ</p>
            <button class="btn btn-primary" onclick="login()">Google ဖြင့် Login ဝင်မည်</button>
        </div>
    </div>

    <div id="mainPage" class="page">
        <div class="nav">
            <b id="userDisplay">User</b>
            <button onclick="logout()" style="color:red; border:none; background:none;">ထွက်ရန်</button>
        </div>
        <div class="card" style="margin-top:20px;">
            <h3>စာရင်းသွင်းရန်</h3>
            <input type="date" id="dateInput">
            <input type="number" id="cost" placeholder="ပမာဏ (Ks)">
            <input type="text" id="note" placeholder="မှတ်ချက်">
            <button class="btn btn-primary" onclick="saveData()">သိမ်းဆည်းမည်</button>
        </div>
        <div id="history" style="margin-top:20px;"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDzEMJWMm6b1bBg2oKcUoYfsUAkhoNoZW4",
        authDomain: "my-expense-app-18a2a.firebaseapp.com",
        projectId: "my-expense-app-18a2a",
        storageBucket: "my-expense-app-18a2a.firebasestorage.app",
        messagingSenderId: "987816810795",
        appId: "1:987816810795:web:b78430ae1326cb62f3cd6e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    }

    function logout() {
        auth.signOut().then(() => location.reload());
    }

    // --- ဤနေရာသည် Loop ပြဿနာကို ဖြေရှင်းသည့် အပိုင်းဖြစ်သည် ---
    auth.onAuthStateChanged((user) => {
        document.getElementById('loading').style.display = 'none';
        if (user) {
            // User ရှိလျှင် Login Page ကို ဖျောက်ပြီး Main Page ကို ပြသည်
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('mainPage').classList.add('active');
            document.getElementById('userDisplay').innerText = user.displayName;
            document.getElementById('dateInput').valueAsDate = new Date();
        } else {
            // User မရှိလျှင် Login Page ကိုသာ ပြသည်
            document.getElementById('loginPage').classList.add('active');
            document.getElementById('mainPage').classList.remove('active');
        }
    });

    async function saveData() {
        const user = auth.currentUser;
        const data = {
            uid: user.uid,
            amount: Number(document.getElementById('cost').value),
            note: document.getElementById('note').value,
            date: document.getElementById('dateInput').value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        try {
            await db.collection("expenses").add(data);
            alert("သိမ်းပြီးပါပြီ!");
        } catch (e) { alert(e.message); }
    }
</script>
</body>
</html>
