<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Elegant UI</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --accent: #2d3436; --text: #2d3436; --soft-bg: #f9f9f9; --border: #ececec; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: white; color: var(--text); margin: 0; }
        
        /* Navigation & Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; position: sticky; top: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); }
        .month-label { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.5px; }
        .profile-trigger { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; cursor: pointer; background: #eee; }

        /* Elegant Dropdown */
        .menu { display: none; position: absolute; right: 20px; top: 70px; background: white; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 180px; overflow: hidden; }
        .menu div { padding: 15px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .menu div:hover { background: var(--soft-bg); }

        /* Pages */
        .page { display: none; max-width: 600px; margin: 0 auto; padding: 20px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Minimalist Table */
        .table-container { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { background: var(--soft-bg); padding: 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
        td { padding: 15px; border-bottom: 1px solid var(--border); text-align: center; }
        input { border: none; outline: none; width: 100%; text-align: center; font-size: 16px; color: var(--text); background: transparent; }
        
        /* Floating Button (FAB) */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; background: var(--accent); color: white; border: none; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; }

        /* Login Screen */
        #loginPage { text-align: center; padding-top: 150px; }
        .btn-login { padding: 15px 30px; border: 1px solid var(--accent); background: white; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background: var(--accent); color: white; }

        /* History & Chart Filters */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        select, .btn-small { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 14px; flex: 1; outline: none; }
    </style>
</head>
<body>

    <header id="appHeader" style="display: none;">
        <div class="month-label" id="dateDisplay">April 2026</div>
        <div style="position: relative;">
            <img src="" id="userImg" class="profile-trigger" onclick="toggleMenu()">
            <div id="userMenu" class="menu">
                <div onclick="nav('mainPage')">Main App</div>
                <div onclick="nav('historyPage')">History</div>
                <div onclick="nav('chartPage')">Charts</div>
                <div onclick="logout()" style="color: #e74c3c;">Logout</div>
            </div>
        </div>
    </header>

    <div id="loginPage" class="page active">
        <h1 style="font-weight: 700; letter-spacing: -1px;">Minimal Expense</h1>
        <p style="color: #888; margin-bottom: 40px;">စာရင်းသွင်းရန် အကောင့်ဝင်ပေးပါ။</p>
        <button class="btn-login" onclick="login()">Sign in with Google</button>
    </div>

    <div id="mainPage" class="page">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>မနက်</th>
                        <th>နေ့လည်</th>
                        <th>ညစာ</th>
                        <th>အခြား</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="number" id="b" placeholder="0"></td>
                        <td><input type="number" id="l" placeholder="0"></td>
                        <td><input type="number" id="d" placeholder="0"></td>
                        <td><input type="number" id="o" placeholder="0"></td>
                    </tr>
                    <tr>
                        <td colspan="4"><input type="text" id="note" placeholder="Note (optional)" style="text-align: left; padding-left: 10px; font-size: 14px; color: #888;"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <button class="fab" onclick="saveData()">+</button>
    </div>

    <div id="historyPage" class="page">
        <div class="controls">
            <select id="hYear"><option value="2026">2026</option></select>
            <select id="hMonth">
                <option value="01">Jan</option><option value="04" selected>Apr</option>
            </select>
            <button class="btn-small" onclick="fetchHistory()">Search</button>
        </div>
        <div class="table-container">
            <table id="hTable">
                <thead><tr><th>Day</th><th>B</th><th>L</th><th>D</th><th>O</th></tr></thead>
                <tbody id="hBody"></tbody>
            </table>
        </div>
    </div>

    <div id="chartPage" class="page">
        <div class="controls">
            <select onchange="updateChartType(this.value)"><option value="month">Monthly</option><option value="year">Yearly</option></select>
        </div>
        <canvas id="expenseChart" height="400"></canvas>
    </div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDzEMJWMm6b1bBg2oKcUoYfsUAkhoNoZW4",
        authDomain: "my-expense-app-18a2a.firebaseapp.com",
        projectId: "my-expense-app-18a2a",
        storageBucket: "my-expense-app-18a2a.firebasestorage.app",
        messagingSenderId: "987816810795",
        appId: "1:987816810795:web:b78430ae1326cb62f3cd6e"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // UI functions
    function toggleMenu() { const m = document.getElementById('userMenu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
    function nav(id) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        toggleMenu();
        if(id === 'chartPage') initChart();
    }

    // Login (Auto-login မဖြစ်အောင် ဤနေရာတွင်သာ login လုပ်ခိုင်းသည်)
    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    // Auth state observer
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('mainPage').classList.add('active');
            document.getElementById('appHeader').style.display = 'flex';
            document.getElementById('userImg').src = user.photoURL;
            document.getElementById('dateDisplay').innerText = new Date().toLocaleString('en-US', { month: 'long', year: 'numeric' });
        }
    });

    async function saveData() {
        const user = auth.currentUser;
        if(!user) return;
        const entry = {
            uid: user.uid,
            date: new Date().toISOString().split('T')[0],
            b: Number(document.getElementById('b').value) || 0,
            l: Number(document.getElementById('l').value) || 0,
            d: Number(document.getElementById('d').value) || 0,
            o: Number(document.getElementById('o').value) || 0,
            note: document.getElementById('note').value,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        await db.collection("expenses").add(entry);
        alert("Saved.");
        location.reload();
    }

    async function fetchHistory() {
        const user = auth.currentUser;
        const y = document.getElementById('hYear').value;
        const m = document.getElementById('hMonth').value;
        const snapshot = await db.collection("expenses")
            .where("uid", "==", user.uid)
            .where("date", ">=", `${y}-${m}-01`)
            .where("date", "<=", `${y}-${m}-31`).get();
        
        let h = "";
        snapshot.forEach(doc => {
            const d = doc.data();
            h += `<tr><td>${d.date.split('-')[2]}</td><td>${d.b}</td><td>${d.l}</td><td>${d.d}</td><td>${d.o}</td></tr>`;
        });
        document.getElementById('hBody').innerHTML = h || "<tr><td colspan='5'>No records</td></tr>";
    }

    let chartObj;
    function initChart() {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'line',
            data: { labels: ['W1', 'W2', 'W3', 'W4'], datasets: [{ label: 'Weekly Spend', data: [12000, 19000, 15000, 22000], borderColor: '#2d3436', tension: 0.4 }] },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }
</script>
</body>
</html>
